<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Baphalmoníacos</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
    h1, h2 { color: #d63031; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 5px; }
    input, textarea, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    button { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
    button:hover { background: #219653; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #962d22; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #f1f2f6; }
    .actions { display: flex; gap: 8px; }
  </style>
</head>
<body>

<div class="container">
  <h1>🥢 Painel Admin - Baphalmoníacos</h1>
  <p>Gerencie as categorias e os pratos do cardápio.</p>
  
  <hr>

  <h2 id="form-title">Cadastrar Novo Produto</h2>
  <form id="product-form">
    <input type="hidden" id="product-id">
    
    <div class="form-group">
      <label for="nome">Nome do Prato:</label>
      <input type="text" id="nome" required placeholder="Ex: Lámen Especial">
    </div>

    <div class="form-group">
      <label for="descricao">Descrição:</label>
      <textarea id="descricao" rows="3" required placeholder="Ingredientes e detalhes do prato..."></textarea>
    </div>

    <div class="form-group">
      <label for="preco">Preço (R$):</label>
      <input type="number" id="preco" step="0.01" required placeholder="0.00">
    </div>

    <div class="form-group">
      <label for="foto">Nome do Arquivo da Foto:</label>
      <input type="text" id="foto" required placeholder="Ex: lamen.png">
    </div>

    <div class="form-group">
      <label for="categoria">Categoria:</label>
      <select id="categoria" required>
        <option value="1">Prato Principal</option>
        <option value="2">Bebidas</option>
      </select>
    </div>

    <button type="submit" id="btn-save">Salvar Produto</button>
    <button type="button" id="btn-cancel" style="display:none; background:#7f8c8d;">Cancelar Edição</button>
  </form>

  <hr style="margin-top: 30px;">

  <h2>Produtos Cadastrados</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Categoria</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="products-table-body">
      </tbody>
  </table>
</div>

<script>
  const API_URL = 'http://localhost:3000/produtos'; // Ajuste a porta se o seu rodar em outra (ex: 4000)

  const form = document.getElementById('product-form');
  const tableBody = document.getElementById('products-table-body');
  const submitBtn = document.getElementById('btn-save');
  const cancelBtn = document.getElementById('btn-cancel');

  // 1. LISTAR PRODUTOS (READ)
  async function loadProducts() {
    try {
      const response = await fetch(API_URL);
      const products = await response.json();
      tableBody.innerHTML = '';

      products.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.id}</td>
          <td><strong>${p.nome}</strong></td>
          <td>R$ ${Number(p.preco).toFixed(2)}</td>
          <td>${p.id_categoria_fk === 1 ? 'Prato Principal' : 'Bebidas'}</td>
          <td class="actions">
            <button onclick="editProduct(${p.id}, '${p.nome}', '${p.descricao}', ${p.preco}, '${p.foto}', ${p.id_categoria_fk})">Editar</button>
            <button class="btn-danger" onclick="deleteProduct(${p.id})">Excluir</button>
          </td>
        `;
        tableBody.appendChild(tr);
      });
    } catch (error) {
      console.error('Erro ao carregar produtos:', error);
    }
  }

  // 2. CRIAR OU ATUALIZAR PRODUTO (CREATE / UPDATE)
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const id = document.getElementById('product-id').value;
    const data = {
      nome: document.getElementById('nome').value,
      descricao: document.getElementById('descricao').value,
      preco: parseFloat(document.getElementById('preco').value),
      foto: document.getElementById('foto').value,
      id_categoria_fk: parseInt(document.getElementById('categoria').value)
    };

    try {
      let response;
      if (id) {
        // Modo Edição (PUT)
        response = await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        // Modo Criação (POST)
        response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }

      if (response.ok) {
        form.reset();
        resetFormState();
        loadProducts();
      }
    } catch (error) {
      console.error('Erro ao salvar produto:', error);
    }
  });

  // 3. PREPARAR FORMULÁRIO PARA EDIÇÃO
  function editProduct(id, nome, descricao, preco, foto, categoriaId) {
    document.getElementById('product-id').value = id;
    document.getElementById('nome').value = nome;
    document.getElementById('descricao').value = descricao;
    document.getElementById('preco').value = preco;
    document.getElementById('foto').value = foto;
    document.getElementById('categoria').value = categoriaId;

    document.getElementById('form-title').innerText = "Editar Produto ID: " + id;
    submitBtn.innerText = "Atualizar Produto";
    cancelBtn.style.display = "inline-block";
  }

  // 4. EXCLUIR PRODUTO (DELETE)
  async function deleteProduct(id) {
    if (confirm('Tem certeza que deseja excluir esse prato maravilhoso?')) {
      try {
        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if (response.ok) loadProducts();
      } catch (error) {
        console.error('Erro ao excluir produto:', error);
      }
    }
  }

  function resetFormState() {
    document.getElementById('product-id').value = '';
    document.getElementById('form-title').innerText = "Cadastrar Novo Produto";
    submitBtn.innerText = "Salvar Produto";
    cancelBtn.style.display = "none";
  }

  cancelBtn.addEventListener('click', () => {
    form.reset();
    resetFormState();
  });

  // Carrega ao abrir a página
  loadProducts();
</script>
</body>
</html>
