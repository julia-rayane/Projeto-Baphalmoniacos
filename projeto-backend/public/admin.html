<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Baphalmoníacos - Administração</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdf3f3; color: #333; padding: 30px; }
        .container { max-width: 600px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #b32424; margin-top: 0; border-bottom: 2px solid #fde1e1; padding-bottom: 8px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 6px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #248a3d; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1c6b2f; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #b32424; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Voltar para o Site principal</a>
        <h1>Painel de Controle 🍜</h1>
        <p>Cadastre aqui as categorias e pratos para alimentar o cardápio automaticamente.</p>

        <div class="box">
            <h2>1. Cadastrar Nova Categoria</h2>
            <form id="formCategoria">
                <label>Nome da Categoria:</label>
                <input type="text" id="nomeCategoria" placeholder="Ex: Pratos Principais, Bebidas, Sobremesas" required>
                <button type="submit">Salvar Categoria</button>
            </form>
        </div>

        <div class="box">
            <h2>2. Cadastrar Novo Produto</h2>
            <form id="formProduto">
                <label>Nome do Prato/Item:</label>
                <input type="text" id="nomeProduto" placeholder="Ex: Lámen Especial" required>
                
                <label>Preço (R$):</label>
                <input type="number" id="precoProduto" step="0.01" placeholder="Ex: 35.00" required>
                
                <label>Descrição:</label>
                <textarea id="descricaoProduto" rows="3" placeholder="Ingredientes ou detalhes do prato..."></textarea>
                
                <label>Categoria:</label>
                <select id="selectCategoria" required>
                    <option value="">Carregando categorias...</option>
                </select>
                
                <button type="submit">Salvar Produto no Cardápio</button>
            </form>
        </div>
    </div>

    <script>
        // Busca as categorias do backend para colocar no campo de seleção
        async function atualizarCategorias() {
            try {
                const res = await fetch('/categorias');
                const categorias = await res.json();
                const select = document.getElementById('selectCategoria');
                select.innerHTML = '<option value="">Selecione uma categoria...</option>';
                categorias.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
                });
            } catch (err) { console.error('Erro ao listar categorias:', err); }
        }

        // Salvar Categoria
        document.getElementById('formCategoria').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nomeCategoria').value;
            const res = await fetch('/categorias', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome })
            });
            if (res.ok) {
                alert('Categoria adicionada com sucesso!');
                document.getElementById('formCategoria').reset();
                atualizarCategorias();
            } else { alert('Falha ao salvar categoria.'); }
        });

        // Salvar Produto
        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nomeProduto').value;
            const preco = parseFloat(document.getElementById('precoProduto').value);
            const descricao = document.getElementById('descricaoProduto').value;
            const id_categoria_fk = parseInt(document.getElementById('selectCategoria').value);

            const res = await fetch('/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, preco, descricao, id_categoria_fk })
            });
            if (res.ok) {
                alert('Prato adicionado ao cardápio!');
                document.getElementById('formProduto').reset();
            } else { alert('Falha ao salvar produto.'); }
        });

        // Inicia carregando as categorias
        atualizarCategorias();
    </script>
</body>
</html>
