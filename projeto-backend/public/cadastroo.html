<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Baphalmoníacos - Cadastros</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdf3f3; color: #333; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: 20px auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #b32424; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #248a3d; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1c6b2f; }
        .voltar { display: block; text-align: center; margin-bottom: 20px; color: #b32424; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="voltar">← Voltar para o Site Principal</a>

    <div class="box">
        <h2>1. Cadastrar Nova Categoria</h2>
        <form id="formCategoria">
            <input type="text" id="nomeCategoria" placeholder="Ex: Pratos Principais, Bebidas" required>
            <button type="submit">Cadastrar Categoria</button>
        </form>
    </div>

    <div class="box">
        <h2>2. Cadastrar Novo Prato no Cardápio</h2>
        <form id="formProduto">
            <input type="text" id="nomeProduto" placeholder="Nome do Prato (Ex: Lámen)" required>
            <input type="number" id="precoProduto" step="0.01" placeholder="Preço (Ex: 35.00)" required>
            <textarea id="descricaoProduto" placeholder="Descrição/Ingredientes..."></textarea>
            <label>Categoria:</label>
            <select id="selectCategoria" required>
                <option value="">Carregando categorias...</option>
            </select>
            <button type="submit">Cadastrar Produto</button>
        </form>
    </div>

    <script>
        async function carregarCategorias() {
            try {
                const res = await fetch('/categorias');
                const categorias = await res.json();
                const select = document.getElementById('selectCategoria');
                select.innerHTML = '<option value="">Selecione uma categoria...</option>';
                categorias.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
                });
            } catch (err) { console.error('Erro ao buscar categorias:', err); }
        }

        document.getElementById('formCategoria').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nomeCategoria').value;
            await fetch('/categorias', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome })
            });
            alert('Categoria cadastrada com sucesso!');
            document.getElementById('formCategoria').reset();
            carregarCategorias();
        });

        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nomeProduto').value;
            const preco = parseFloat(document.getElementById('precoProduto').value);
            const descricao = document.getElementById('descricaoProduto').value;
            const id_categoria_fk = parseInt(document.getElementById('selectCategoria').value);

            await fetch('/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, preco, descricao, id_categoria_fk })
            });
            alert('Prato cadastrado com sucesso!');
            document.getElementById('formProduto').reset();
        });

        carregarCategorias();
    </script>
</body>
</html>
